name: ml4dd2025
# Chapter 9 conda "island". Chapter 9 (structure-based drug design with active
# learning) needs openmm / pdbfixer / vina, which do not install reliably via
# pip. Everything else in the book uses the uv/pip path (see README / INSTALL).
# Trimmed to what Chapter 9 actually imports; the kernel name is kept as
# `ml4dd2025` to match the notebook kernelspec.
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12

  # Scientific computing (optimized conda builds). numpy is uncapped to match
  # pyproject.toml; if a conda/pip mix breaks under numpy 2, pin <2.0.0 here.
  - numpy>=1.26.4
  - scipy>=1.15.0

  # Chemistry toolkit
  - rdkit>=2024.3.2

  # Molecular dynamics & docking — the conda-only packages that motivate this env
  - openmm>=8.2.0
  - pdbfixer>=1.10
  - vina>=1.2.5

  # Remaining Chapter 9 dependencies via pip for the latest wheels
  - pip
  - pip:
      # Deep learning (active-learning surrogate model)
      - torch>=2.4.1
      - scikit-learn>=1.6.0

      # Docking / structure helpers used in Chapter 9
      - meeko>=0.5.0
      - mdtraj>=1.10.2
      - prolif>=2.0.3
      - gemmi>=0.7.0
      - openbabel-wheel>=3.1.1

      # Data, visualization, experiment logging
      - pandas>=2.2.3
      - matplotlib>=3.10.0
      - seaborn>=0.13.2
      - py3Dmol>=2.4.2
      - tensorboard>=2.18.0
      - tqdm>=4.67.1

      # Notebook environment
      - jupyterlab>=4.3.0
      - ipykernel>=6.29.0
